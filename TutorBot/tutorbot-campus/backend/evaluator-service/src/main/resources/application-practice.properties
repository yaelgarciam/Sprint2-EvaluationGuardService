# ── Practice profile: only Oracle + Ollama, no RabbitMQ / Eureka ──
spring.application.name=evaluator-service
server.port=8082

# Oracle DataSource (docker-compose-practice.yml exposes port 1522)
spring.datasource.url=jdbc:oracle:thin:@localhost:1522/XEPDB1
spring.datasource.username=Adolfo
spring.datasource.password=password
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect

# Disable RabbitMQ auto-config (not needed for this practice)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
tutorbot.messaging.enabled=false

# Disable Eureka (not needed for this practice)
eureka.client.enabled=false

# Ollama LLM
ollama.base-url=http://localhost:11434
ollama.model=llama3
ollama.timeout=60000

# Actuator
management.endpoints.web.exposure.include=health,info
